<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="vista previa de una tarjeta de blog">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;800&display=swap" rel="stylesheet">
    <title>Blog Preview Card</title>
</head>

<body>
    <main>
        <article class="container">
            <img class="img-card" src="blog-preview-card-main/assets/images/illustration-article.svg"
                alt="Ilustración abstracta de artículo">
            <span class="tag">Learning</span>
            <time datetime="2023-12-21">Published 21 Dec 2023</time>
            <h1><a class="title" href="#">HTML & CSS foundations</a></h1>
            <p class="resumen">These languages are the backbone of every website, defining structure, content, and
                presentation.</p>
            <footer class="author">
                <img class="avatar" src="blog-preview-card-main/assets/images/image-avatar.webp"
                    alt="avatar de Greg Hooper">
                <p class="name">Greg Hooper</p>
            </footer>

        </article>

    </main>
</body>

</html>
